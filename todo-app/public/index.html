<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        #todoInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        #todoInput:focus {
            outline: none;
            border-color: #667eea;
        }

        #addBtn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        #addBtn:hover {
            background: #5568d3;
        }

        #addBtn:active {
            transform: scale(0.98);
        }

        #todoList {
            list-style: none;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .todo-item:hover {
            background: #f0f2f7;
            transform: translateX(4px);
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #999;
        }

        .todo-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .todo-text {
            flex: 1;
            font-size: 16px;
            color: #333;
        }

        .delete-btn {
            padding: 8px 12px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .delete-btn:hover {
            background: #ff5252;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 16px;
        }

        .loading {
            text-align: center;
            color: #667eea;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 My Todos</h1>
        
        <div class="input-section">
            <input 
                type="text" 
                id="todoInput" 
                placeholder="Add a new todo..."
                autocomplete="off"
            >
            <button id="addBtn">Add</button>
        </div>

        <ul id="todoList"></ul>
        <div id="emptyState" class="empty-state">No todos yet. Add one above!</div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        // Change this to your actual backend URL once deployed
        const BACKEND_URL = "http://localhost:8787/api/todos"; // For local testing
        // After deployment, change to: const BACKEND_URL = "https://your-worker.workers.dev/api/todos";

        const todoInput = document.getElementById("todoInput");
        const addBtn = document.getElementById("addBtn");
        const todoList = document.getElementById("todoList");
        const emptyState = document.getElementById("emptyState");

        // ===== FETCH ALL TODOS =====
        async function loadTodos() {
            try {
                const response = await fetch(BACKEND_URL);
                const todos = await response.json();
                
                todoList.innerHTML = "";
                
                if (todos.length === 0) {
                    emptyState.style.display = "block";
                    return;
                }

                emptyState.style.display = "none";
                todos.forEach(todo => {
                    addTodoToDOM(todo);
                });
            } catch (error) {
                console.error("Error loading todos:", error);
            }
        }

        // ===== ADD TODO TO DOM =====
        function addTodoToDOM(todo) {
            const li = document.createElement("li");
            li.className = `todo-item ${todo.completed ? "completed" : ""}`;
            li.innerHTML = `
                <input 
                    type="checkbox" 
                    class="todo-checkbox" 
                    ${todo.completed ? "checked" : ""}
                    data-id="${todo.id}"
                >
                <span class="todo-text">${todo.title}</span>
                <button class="delete-btn" data-id="${todo.id}">Delete</button>
            `;

            // Checkbox toggle handler
            li.querySelector(".todo-checkbox").addEventListener("change", (e) => {
                toggleTodo(todo.id, e.target.checked);
            });

            // Delete button handler
            li.querySelector(".delete-btn").addEventListener("click", () => {
                deleteTodo(todo.id);
            });

            todoList.appendChild(li);
        }

        // ===== ADD NEW TODO =====
        async function addTodo() {
            const title = todoInput.value.trim();
            
            if (!title) {
                alert("Please enter a todo!");
                return;
            }

            try {
                const response = await fetch(BACKEND_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ title }),
                });

                if (response.ok) {
                    const newTodo = await response.json();
                    addTodoToDOM(newTodo);
                    todoInput.value = "";
                    emptyState.style.display = "none";
                }
            } catch (error) {
                console.error("Error adding todo:", error);
            }
        }

        // ===== DELETE TODO =====
        async function deleteTodo(id) {
            try {
                const response = await fetch(`${BACKEND_URL.replace('/api/todos', '')}/api/todos/${id}`, {
                    method: "DELETE",
                });

                if (response.ok) {
                    loadTodos(); // Reload all todos
                }
            } catch (error) {
                console.error("Error deleting todo:", error);
            }
        }

        // ===== TOGGLE TODO COMPLETION =====
        async function toggleTodo(id, completed) {
            try {
                const response = await fetch(`${BACKEND_URL.replace('/api/todos', '')}/api/todos/${id}`, {
                    method: "PATCH",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ completed }),
                });

                if (response.ok) {
                    loadTodos(); // Reload all todos
                }
            } catch (error) {
                console.error("Error toggling todo:", error);
            }
        }

        // ===== EVENT LISTENERS =====
        addBtn.addEventListener("click", addTodo);
        todoInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                addTodo();
            }
        });

        // Load todos on page load
        loadTodos();
    </script>
</body>
</html>
